<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Extractor</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9f9f9; color: #333;}
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 15px; }
        .radio-group label { font-weight: normal; display: inline; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .result-box { margin-top: 20px; padding: 20px; background: #eef8e6; border-left: 5px solid #28a745; border-radius: 4px; word-wrap: break-word; }
        .error-box { margin-top: 20px; padding: 20px; background: #fdf3f4; border-left: 5px solid #dc3545; border-radius: 4px; }
        .url-text { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Mapple Extractor</h2>
    <form method="POST">
        <div class="form-group">
            <label>Media Type:</label>
            <div class="radio-group">
                <div>
                    <input type="radio" name="media_type" value="movie" id="type_movie" checked onchange="toggleTV()"> 
                    <label for="type_movie">Movie</label>
                </div>
                <div>
                    <input type="radio" name="media_type" value="tv" id="type_tv" onchange="toggleTV()"> 
                    <label for="type_tv">TV Show</label>
                </div>
            </div>
        </div>
        
        <div class="form-group">
            <label for="media_id">TMDB ID:</label>
            <input type="number" name="media_id" id="media_id" required placeholder="e.g., 1318447">
        </div>

        <div id="tv_fields" class="hidden">
            <div class="form-group">
                <label for="season">Season:</label>
                <input type="number" name="season" id="season_input" placeholder="e.g., 1">
            </div>
            <div class="form-group">
                <label for="episode">Episode:</label>
                <input type="number" name="episode" id="episode_input" placeholder="e.g., 1">
            </div>
        </div>

        <button type="submit">Extract Stream</button>
    </form>

    {% if result %}
        {% if result.error %}
            <div class="error-box">
                <strong>Error:</strong> {{ result.error }}
            </div>
        {% else %}
            <div class="result-box">
                <p><strong>Stream URL:</strong></p>
                <p class="url-text"><a href="{{ result.stream_url }}" target="_blank">{{ result.stream_url }}</a></p>
                <hr style="border:0; border-top: 1px solid #ccc; margin: 15px 0;">
                <p><strong>Required Headers:</strong></p>
                <ul style="margin: 0; padding-left: 20px;">
                    {% for k, v in result.headers.items() %}
                        <li><strong>{{ k }}:</strong> {{ v }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}
    {% endif %}
</div>

<script>
    function toggleTV() {
        const isTV = document.getElementById('type_tv').checked;
        const tvFields = document.getElementById('tv_fields');
        const seasonInput = document.getElementById('season_input');
        const episodeInput = document.getElementById('episode_input');
        
        if (isTV) {
            tvFields.classList.remove('hidden');
            seasonInput.required = true;
            episodeInput.required = true;
        } else {
            tvFields.classList.add('hidden');
            seasonInput.required = false;
            episodeInput.required = false;
        }
    }
    toggleTV();
</script>

</body>
</html>
